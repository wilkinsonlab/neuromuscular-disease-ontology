# PURL configuration for http://purl.obolibrary.org/obo/nmdo

idspace: NMDO
base_url: /obo/nmdo

products:
- nmdo.owl: https://raw.githubusercontent.com/NeuromuscularDisease/neuromuscular-disease-ontology/main/nmdo.owl
- nmdo.obo: https://raw.githubusercontent.com/NeuromuscularDisease/neuromuscular-disease-ontology/main/nmdo.obo

term_browser: ontobee
example_terms:
- NMDO_0000000

entries:

- prefix: /releases/
  replacement: https://raw.githubusercontent.com/NeuromuscularDisease/neuromuscular-disease-ontology/v

- prefix: /tracker/
  replacement: https://github.com/NeuromuscularDisease/neuromuscular-disease-ontology/issues

- prefix: /about/
  replacement: http://www.ontobee.org/ontology/NMDO?iri=http://purl.obolibrary.org/obo/

## generic fall-through, serve direct from github by default
- prefix: /
  replacement: https://raw.githubusercontent.com/NeuromuscularDisease/neuromuscular-disease-ontology/main/

